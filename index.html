<!DOCTYPE html>
<head><title>Code Battles</title>
<style>
    body{
        background: #171616;
        font-family: "Space Grotesk", sans-serif;
        margin:0px;
    }
    input{
        background-color: #333;
        color:white;
        border: 2px solid blue;
        border-radius:8px;
        height: 40px;
        width:300px;
        margin:0 auto;
    }
    button:hover{
        background-color: #1c1b1b;
    }
        
    #join-ui{
        display: flex;
        flex-direction: column;
        align-items: center;
        background: #1a1d29;
        padding:20px;
        border-radius: 20px;
        margin: 10px;


    }
    p{
        color:white;
        text-align: center;
    }
    #mainstuff{
        display: flex;
        flex-direction: column;
        background: #1a1d29;
        padding:40px;
        border-radius: 20px;
        margin:10px;
    }
    #buttonsanddrop{
        display: flex;
        flex-direction: column;
        align-items: center;
        padding:20px;
        gap:14px;
    }
    button{
        background-color: #333;
        color:white;
        border: 2px solid blue;
        border-radius:8px;
        height: 40px;
        width:300px;
    }
    select{
        background-color: #333;
        color:white;
        border: 2px solid blue;
        border-radius:8px;
        height: 40px;
        width:300px;
    }
    .topnav{
        background-color: #0098d0;
        overflow: hidden;
        padding:0;
        display: flex;
        justify-content: center;
        gap: 40px;
      

    }
    .topnav a{
        text-decoration: none;
        color:#171616;
        display: block;
        font-weight:600;
        float:left;
        padding: 14px 16px;
        font-weight: 600;
        font-size: 17px;

    }
    .topnav a:hover{
        background-color: #007aa7;
        color:white;

    }
    .topnav a.active{
        background-color: #007aa7;
    }
    h1{
        color:white;
        text-align: center;
        font-size: 150px;
    }
    
    </style>
    <body>
        <div class="topnav">
<a href="#home">Home</a>
<a href="#host">Host</a>
<a href="#play">Play</a>


    </div>
        <h1>Play using navbar!</h1>
    </body>
</head>
